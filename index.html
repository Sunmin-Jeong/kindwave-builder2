<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Korean Convenience Store Ramen Guide</title>
    <meta name="description" content="Discover the best Korean instant ramen at convenience stores like GS25, CU, and 7-Eleven.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>Best Korean Convenience Store Ramen</h1>
            <p class="subtitle">Top instant ramen to try in Korean convenience stores like <strong>GS25</strong>, <strong>CU</strong>, and <strong>7-Eleven</strong>.</p>
        </div>
    </header>

    <main class="container">
        <section class="filter-section">
            <p>Filter by Spice Level:</p>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="mild">Mild</button>
                <button class="filter-btn" data-filter="medium">Medium</button>
                <button class="filter-btn" data-filter="spicy">Spicy</button>
                <button class="filter-btn" data-filter="extreme">Extreme</button>
            </div>
        </section>

        <section id="ramen-grid" class="ramen-grid">
            <!-- Ramen cards will be injected here by JavaScript -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Korean Convenience Store Ramen Guide for International Visitors</p>
            <p>&copy; 2026 Ramen Guide Korea</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
